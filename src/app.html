<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script>!function(){try{var e=localStorage.getItem("neuralsim-theme");"light"===e||"dark"===e?document.documentElement.setAttribute("data-theme",e):document.documentElement.setAttribute("data-theme","dark")}catch(e){}}()</script>
		%sveltekit.head%
	</head>
	<body>
		<div id="app">%sveltekit.body%</div>
	</body>
</html>
